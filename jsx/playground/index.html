<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>@slimlib/jsx playground</title>
        <style>
            :root {
                color-scheme: light dark;
                font-family: system-ui, sans-serif;
            }
            body {
                margin: 0;
                padding: 2rem;
                max-width: 56rem;
                margin-inline: auto;
                line-height: 1.5;
            }
            h1 {
                margin-block-end: 0;
            }
            .demo {
                border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
                border-radius: 0.5rem;
                padding: 1rem 1.25rem;
                margin-block: 1rem;
            }
            .demo > h2 {
                margin: 0 0 0.5rem;
                font-size: 1rem;
                opacity: 0.7;
            }
            button {
                font: inherit;
                padding: 0.25rem 0.75rem;
                cursor: pointer;
            }
            input[type='text'] {
                font: inherit;
                padding: 0.25rem 0.5rem;
            }
            ul.todo {
                list-style: none;
                padding: 0;
                margin: 0;
            }
            ul.todo li {
                display: flex;
                gap: 0.5rem;
                align-items: center;
                padding-block: 0.25rem;
            }
            ul.todo li.done > span {
                text-decoration: line-through;
                opacity: 0.5;
            }
            .row {
                display: flex;
                gap: 0.5rem;
                align-items: center;
                flex-wrap: wrap;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/main.js"></script>
    </body>
</html>
