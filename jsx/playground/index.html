<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>@slimlib/jsx playground</title>
        <style>
            :root {
                color-scheme: light dark;
                font-family: system-ui, sans-serif;
            }
            body {
                margin: 0;
                padding: 2rem;
                max-width: 56rem;
                margin-inline: auto;
                line-height: 1.5;
            }
            h1 {
                margin-block-end: 0;
            }
            .demo {
                border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
                border-radius: 0.5rem;
                padding: 1rem 1.25rem;
                margin-block: 1rem;
            }
            .demo > h2 {
                margin: 0 0 0.5rem;
                font-size: 1rem;
                opacity: 0.7;
            }
            button {
                font: inherit;
                padding: 0.25rem 0.75rem;
                cursor: pointer;
            }
            input[type='text'] {
                font: inherit;
                padding: 0.25rem 0.5rem;
            }
            ul.todo {
                list-style: none;
                padding: 0;
                margin: 0;
            }
            ul.todo li {
                display: flex;
                gap: 0.5rem;
                align-items: center;
                padding-block: 0.25rem;
            }
            ul.todo li.done > span {
                text-decoration: line-through;
                opacity: 0.5;
            }
            .row {
                display: flex;
                gap: 0.5rem;
                align-items: center;
                flex-wrap: wrap;
            }
            .cells {
                display: grid;
                grid-template-columns: repeat(100, 10px);
                gap: 1px;
                margin-block: 0.5rem;
                font: 8px/10px monospace;
            }
            .cells .cell {
                width: 10px;
                height: 10px;
                background: color-mix(in srgb, currentColor 8%, transparent);
                text-align: center;
                overflow: hidden;
                color: color-mix(in srgb, currentColor 70%, transparent);
            }
            .stage {
                position: relative;
                width: 420px;
                height: 220px;
                margin-block: 0.5rem;
                border: 1px dashed color-mix(in srgb, currentColor 20%, transparent);
                border-radius: 0.25rem;
                overflow: hidden;
            }
            .stage .box {
                position: absolute;
                top: 0;
                left: 0;
                width: 6px;
                height: 6px;
                background: tomato;
                border-radius: 50%;
                will-change: transform;
            }
            .cascade {
                display: flex;
                flex-direction: column;
                gap: 0.25rem;
                margin-block: 0.5rem;
                font: 11px/1.4 monospace;
            }
            .cascade-level {
                display: flex;
                gap: 0.25rem;
                justify-content: center;
                flex-wrap: wrap;
            }
            .cascade-node {
                min-width: 2.5em;
                padding: 0.1rem 0.35rem;
                text-align: center;
                background: color-mix(in srgb, currentColor 8%, transparent);
                border-radius: 0.2rem;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/main.js"></script>
    </body>
</html>
